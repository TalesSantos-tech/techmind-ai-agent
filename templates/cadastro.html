<!DOCTYPE html>
<html>

<head>

    <title>Cadastro</title>

</head>

<body>

    <h1>Cadastro</h1>

    <form method="POST">

        <input
            type="text"
            name="nome"
            placeholder="Nome"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            name="senha"
            placeholder="Senha"
            required
        >

        <button type="submit">
            Cadastrar
        </button>

    </form>

</body>
</html>
